name: Deploy to Openshift
description: Build and push the Rails/React application image to the OpenShift registry

inputs:
  branch:
    description: Branch to deploy
    required: true
  github_token:
    description: GitHub token for deployment status updates
    required: true
  deployment_environment:
    description: Deployment environment name for GitHub/Jira
    required: true
  environment_label:
    description: Environment label for logs
    required: true
  image_name:
    description: OpenShift image name
    required: true
  build_args:
    description: Docker build args
    required: true
  registry_url:
    description: OpenShift registry URL
    required: true
  builder_username:
    description: Registry service account username
    required: true
  builder_token:
    description: Registry service account token
    required: true

runs:
  using: composite
  steps:
    - name: Start GitHub deployment
      id: deployment-start
      uses: bobheadxi/deployments@v1
      with:
        step: start
        token: ${{ inputs.github_token }}
        env: ${{ inputs.deployment_environment }}
        ref: ${{ inputs.branch }}
        desc: OpenShift deployment to ${{ inputs.environment_label }} for ${{ inputs.branch }}

    - name: Install Git LFS
      id: install-git-lfs
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install git-lfs
        git lfs install

    - name: Checkout Code
      id: checkout-code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}
        lfs: true

    - name: Update GITHUB_SHA with checked-out commit SHA
      id: capture-git-sha
      shell: bash
      run: echo "GITHUB_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

    - name: Confirm branch and SHA to deploy
      id: confirm-deploy-target
      shell: bash
      run: |
        echo "Deploying branch: ${{ inputs.branch }} @ ${{ env.GITHUB_SHA }} to ${{ inputs.environment_label }}"

    - name: Build Docker Image
      id: build-image
      uses: redhat-actions/buildah-build@v2
      with:
        image: ${{ inputs.image_name }}
        tags: latest ${{ env.GITHUB_SHA }}
        labels: |
          app=${{ inputs.image_name }}
          git-sha=${{ env.GITHUB_SHA }}
        containerfiles: ./devops/docker/app/Dockerfile
        build-args: ${{ inputs.build_args }}

    - name: Push to Openshift Registry using Service Account
      id: push-image
      uses: redhat-actions/push-to-registry@v2.7
      with:
        image: ${{ inputs.image_name }}
        registry: ${{ inputs.registry_url }}
        username: ${{ inputs.builder_username }}
        password: ${{ inputs.builder_token }}

    - name: Finish GitHub deployment
      if: always()
      uses: bobheadxi/deployments@v1
      with:
        step: finish
        token: ${{ inputs.github_token }}
        deployment_id: ${{ steps.deployment-start.outputs.deployment_id }}
        env: ${{ steps.deployment-start.outputs.env }}
        status: ${{ steps.push-image.outcome == 'success' && 'success' || 'failure' }}
        logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env_url: ${{ github.server_url }}/${{ github.repository }}/tree/${{ inputs.branch }}
        desc: OpenShift deployment to ${{ inputs.environment_label }} finished for ${{ inputs.branch }}
