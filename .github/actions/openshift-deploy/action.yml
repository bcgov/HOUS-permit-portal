name: Deploy to Openshift
description: Build and push the Rails/React application image to the OpenShift registry

inputs:
  branch:
    description: Branch to deploy
    required: true
  github_token:
    description: GitHub token for deployment status updates
    required: true
  deployment_environment:
    description: Deployment environment name for GitHub/Jira
    required: true
  environment_label:
    description: Environment label for logs
    required: true
  image_name:
    description: OpenShift image name
    required: true
  build_args:
    description: Docker build args
    required: true
  registry_url:
    description: OpenShift registry URL
    required: true
  builder_username:
    description: Registry service account username
    required: true
  builder_token:
    description: Registry service account token
    required: true

runs:
  using: composite
  steps:
    - name: Start GitHub deployment
      id: deployment-start
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        DEPLOYMENT_ENVIRONMENT: ${{ inputs.deployment_environment }}
        DEPLOYMENT_REF: ${{ inputs.branch }}
        DEPLOYMENT_DESCRIPTION: OpenShift deployment to ${{ inputs.environment_label }} for ${{ inputs.branch }}
      run: |
        python3 <<'PY'
        import json
        import os
        import urllib.request

        api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
        repository = os.environ["GITHUB_REPOSITORY"]
        payload = {
            "ref": os.environ["DEPLOYMENT_REF"],
            "environment": os.environ["DEPLOYMENT_ENVIRONMENT"],
            "description": os.environ["DEPLOYMENT_DESCRIPTION"],
            "auto_merge": False,
            "required_contexts": [],
        }
        request = urllib.request.Request(
            f"{api_url}/repos/{repository}/deployments",
            data=json.dumps(payload).encode(),
            headers={
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                "X-GitHub-Api-Version": "2022-11-28",
            },
            method="POST",
        )

        with urllib.request.urlopen(request) as response:
            deployment = json.load(response)

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            output.write(f"deployment_id={deployment['id']}\n")
            output.write(f"env={deployment['environment']}\n")
        PY

    - name: Install container build tools
      id: install-container-build-tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y git-lfs buildah podman
        git lfs install

    - name: Checkout Code
      id: checkout-code
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.branch }}
        lfs: true

    - name: Update GITHUB_SHA with checked-out commit SHA
      id: capture-git-sha
      shell: bash
      run: echo "GITHUB_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

    - name: Confirm branch and SHA to deploy
      id: confirm-deploy-target
      shell: bash
      env:
        DEPLOY_BRANCH: ${{ inputs.branch }}
        ENVIRONMENT_LABEL: ${{ inputs.environment_label }}
      run: |
        echo "Deploying branch: ${DEPLOY_BRANCH} @ ${GITHUB_SHA} to ${ENVIRONMENT_LABEL}"

    - name: Build Docker Image
      id: build-image
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image_name }}
        BUILD_ARGS: ${{ inputs.build_args }}
      run: |
        build_args=()
        while IFS= read -r build_arg; do
          [[ -z "$build_arg" ]] && continue
          build_args+=(--build-arg "$build_arg")
        done <<< "$BUILD_ARGS"

        buildah bud \
          --format docker \
          --file ./devops/docker/app/Dockerfile \
          --label "app=${IMAGE_NAME}" \
          --label "git-sha=${GITHUB_SHA}" \
          --tag "${IMAGE_NAME}:latest" \
          --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
          "${build_args[@]}" \
          .

    - name: Push to Openshift Registry using Service Account
      id: push-image
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image_name }}
        REGISTRY_URL: ${{ inputs.registry_url }}
        BUILDER_USERNAME: ${{ inputs.builder_username }}
        BUILDER_TOKEN: ${{ inputs.builder_token }}
      run: |
        registry_path="${REGISTRY_URL#http://}"
        registry_path="${registry_path#https://}"
        registry_path="${registry_path%/}"
        registry_host="${registry_path%%/*}"

        printf '%s' "$BUILDER_TOKEN" | podman login "$registry_host" --username "$BUILDER_USERNAME" --password-stdin

        for tag in latest "$GITHUB_SHA"; do
          podman push "${IMAGE_NAME}:${tag}" "${registry_path}/${IMAGE_NAME}:${tag}"
        done

    - name: Finish GitHub deployment
      if: always()
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        DEPLOYMENT_ID: ${{ steps.deployment-start.outputs.deployment_id }}
        DEPLOYMENT_STATUS: ${{ steps.push-image.outcome == 'success' && 'success' || 'failure' }}
        DEPLOYMENT_LOGS_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        DEPLOYMENT_ENV_URL: ${{ github.server_url }}/${{ github.repository }}/tree/${{ inputs.branch }}
        DEPLOYMENT_DESCRIPTION: OpenShift deployment to ${{ inputs.environment_label }} finished for ${{ inputs.branch }}
      run: |
        if [[ -z "$DEPLOYMENT_ID" ]]; then
          echo "No deployment id was created; skipping deployment status update."
          exit 0
        fi

        python3 <<'PY'
        import json
        import os
        import urllib.request

        api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
        repository = os.environ["GITHUB_REPOSITORY"]
        deployment_id = os.environ["DEPLOYMENT_ID"]
        payload = {
            "state": os.environ["DEPLOYMENT_STATUS"],
            "log_url": os.environ["DEPLOYMENT_LOGS_URL"],
            "environment_url": os.environ["DEPLOYMENT_ENV_URL"],
            "description": os.environ["DEPLOYMENT_DESCRIPTION"],
            "auto_inactive": False,
        }
        request = urllib.request.Request(
            f"{api_url}/repos/{repository}/deployments/{deployment_id}/statuses",
            data=json.dumps(payload).encode(),
            headers={
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                "X-GitHub-Api-Version": "2022-11-28",
            },
            method="POST",
        )

        with urllib.request.urlopen(request):
            pass
        PY
